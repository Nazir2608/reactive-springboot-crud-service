server:
  port: 8080

spring:
  application:
    name: reactive-springboot-crud-service

  # R2DBC - Reactive MySQL connection
  r2dbc:
    url: r2dbc:mysql://localhost:3306/reactive_db
    username: root
    password: MySql@123
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  # Flyway uses JDBC (not R2DBC) just to run schema migrations
  flyway:
    url: jdbc:mysql://localhost:3306/reactive_db?createDatabaseIfNotExist=true
    user: root
    password: MySql@123
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example.reactivecrud: DEBUG
    io.r2dbc: DEBUG